<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>对话渲染工具</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "PingFang SC", sans-serif; background: #F5F5F5; display: flex; height: 100vh; }

#left { width: 300px; flex-shrink: 0; background: #fff; border-right: 1px solid #E5E5E5; display: flex; flex-direction: column; padding: 20px; gap: 12px; }
#left h2 { font-size: 15px; font-weight: 700; }
#left small { font-size: 12px; color: #999; line-height: 1.6; }
#jsonInput { flex: 1; border: 1px solid #E5E5E5; border-radius: 8px; padding: 12px; font-size: 12px; font-family: monospace; resize: none; outline: none; color: #333; }
#jsonInput:focus { border-color: #007AFF; }
.tags { display: flex; gap: 6px; flex-wrap: wrap; }
.tag { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; cursor: pointer; border: 1.5px solid; opacity: 0.35; user-select: none; transition: opacity .15s; }
.tag.on { opacity: 1; }
.miss  { background:#FFF3F3; color:#E53935; border-color:#FFCDD2; }
.wrong { background:#FFF8E1; color:#F57C00; border-color:#FFE082; }
.ok    { background:#E8F5E9; color:#388E3C; border-color:#A5D6A7; }
#noteInput { border: 1px solid #E5E5E5; border-radius: 6px; padding: 6px 10px; font-size: 12px; outline: none; width: 100%; }
.btns { display: flex; gap: 8px; }
.btn { flex:1; padding: 10px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-go { background: #007AFF; color: #fff; }
.btn-cl { background: #F0F0F0; color: #666; }

#right { flex: 1; overflow-y: auto; padding: 28px 36px; }
.empty { height: 100%; display: flex; align-items: center; justify-content: center; color: #ccc; font-size: 14px; }
.err { background:#FFF3F3; border:1px solid #FFCDD2; border-radius:8px; padding:10px 14px; font-size:12px; color:#E53935; margin-bottom:12px; }

.label-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; align-items:center; }
.label-row .tag { opacity:1; }
.note-badge { font-size:12px; color:#555; background:#F5F5F5; padding:3px 10px; border-radius:20px; }

.tbl-wrap { background:#fff; border-radius:12px; border:1px solid #E5E5E5; overflow:hidden; max-width:900px; }
.tbl-head { padding:11px 16px; background:#FAFAFA; border-bottom:1px solid #E5E5E5; display:flex; justify-content:space-between; align-items:center; }
.tbl-head-title { font-size:13px; font-weight:600; color:#333; }
.tbl-head-meta { font-size:11px; color:#888; }

table { width:100%; border-collapse:collapse; }
thead th { padding:9px 14px; text-align:left; font-size:11px; font-weight:700; color:#888; text-transform:uppercase; letter-spacing:0.5px; background:#FAFAFA; border-bottom:2px solid #E5E5E5; border-right:1px solid #E5E5E5; }
thead th:last-child { border-right:none; }
tbody tr { border-bottom:1px solid #E5E5E5; cursor:pointer; }
tbody tr:last-child { border-bottom:none; }
td { padding:10px 14px; font-size:13px; color:#BBBBBB; line-height:1.6; vertical-align:top; white-space:pre-wrap; word-break:break-word; border-right:1px solid #E5E5E5; }
td:last-child { border-right:none; }
td:first-child { width:36px; text-align:center; font-size:11px; font-weight:700; color:#CCC; }

/* 末轮高亮（蓝色） */
tbody tr.last-row td { color:#1a1a1a; background:#EFF6FF; }
tbody tr.last-row td:first-child { color:#007AFF; background:#DBEAFE; }

/* 手动点击高亮（黄色） */
tbody tr.hl-row td { color:#1a1a1a !important; background:#FFFBEB !important; }
tbody tr.hl-row td:first-child { color:#B45309 !important; background:#FEF3C7 !important; }

/* 折叠行 */
tr.fold-row td { text-align:center; color:#CCC; font-size:11px; background:#FAFAFA; padding:6px; cursor:default; }

/* 按钮行 */
.btn-row { display:flex; gap:8px; margin-top:12px; max-width:900px; }
.action-btn { display:inline-flex; align-items:center; gap:5px; padding:7px 14px; border:none; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; transition:opacity .15s; }
.action-btn:hover { opacity:0.8; }
.action-btn:disabled { opacity:0.45; cursor:not-allowed; }
.btn-shot { background:#1a1a1a; color:#fff; }
.btn-shot.done { background:#388E3C; }
.btn-hint { background:#F0F0F0; color:#666; font-size:11px; padding:7px 12px; }
</style>
</head>
<body>

<div id="left">
  <h2>对话渲染工具</h2>
  <small>粘贴 conversations JSON，渲染为表格。<br>末轮自动蓝色高亮，也可点击任意行手动黄色高亮。<br><br>支持两种格式：<br>· {"role":"user","content":"..."}<br>· {"prompt":"...","answer":"..."}</small>

  <textarea id="jsonInput" placeholder='[
  {"role":"user","content":"帮我写商业计划书"},
  {"role":"assistant","content":"好的，请说明方向"},
  {"role":"user","content":"宠物食品方向，面向C端"}
]'></textarea>

  <div style="display:flex;flex-direction:column;gap:6px;">
    <small style="color:#aaa;">标注标签</small>
    <div class="tags">
      <span class="tag miss" onclick="this.classList.toggle('on')">⚠️ 漏召</span>
      <span class="tag wrong" onclick="this.classList.toggle('on')">❌ 误判</span>
      <span class="tag ok" onclick="this.classList.toggle('on')">✅ 正确</span>
    </div>
    <input id="noteInput" type="text" placeholder="备注（可选）">
  </div>

  <div class="btns">
    <button class="btn btn-go" onclick="doRender()">渲染 ⌘↵</button>
    <button class="btn btn-cl" onclick="doClear()">清空</button>
  </div>
</div>

<div id="right">
  <div class="empty">粘贴 JSON 后点击「渲染」</div>
</div>

<script>
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) doRender();
});

function doClear() {
  document.getElementById('jsonInput').value = '';
  document.getElementById('noteInput').value = '';
  document.getElementById('right').innerHTML = '<div class="empty">粘贴 JSON 后点击「渲染」</div>';
}

function doRender() {
  var raw = document.getElementById('jsonInput').value.trim();
  var right = document.getElementById('right');
  right.innerHTML = '';
  if (!raw) { right.innerHTML = '<div class="empty">请先粘贴 JSON 数据</div>'; return; }

  var data;
  try {
    data = JSON.parse(raw);
    if (!Array.isArray(data)) data = [data];
  } catch(e) {
    right.innerHTML = '<div class="err">JSON 解析失败：' + e.message + '</div>';
    return;
  }

  var turns = [];
  var cur = null;
  for (var i = 0; i < data.length; i++) {
    var item = data[i];
    if (item.role !== undefined) {
      if (item.role === 'system') continue;
      var c = (item.content || '').trim();
      if (!c) continue;
      if (item.role === 'user') {
        cur = { prompt: c, answer: '' };
        turns.push(cur);
      } else {
        if (cur) cur.answer = c;
        else { cur = { prompt: '', answer: c }; turns.push(cur); }
      }
    } else if (item.prompt !== undefined) {
      turns.push({ prompt: (item.prompt||'').trim(), answer: (item.answer||'').trim() });
    }
  }

  if (!turns.length) {
    right.innerHTML = '<div class="err">未识别到消息，请确认字段名为 role/content 或 prompt/answer。</div>';
    return;
  }

  // 标签行
  var activeTags = [];
  document.querySelectorAll('.tag.on').forEach(function(el) { activeTags.push(el.textContent.trim()); });
  var note = document.getElementById('noteInput').value.trim();
  if (activeTags.length || note) {
    var lr = document.createElement('div');
    lr.className = 'label-row';
    activeTags.forEach(function(t) {
      var s = document.createElement('span');
      s.className = 'tag ' + (t.indexOf('漏')>=0?'miss':t.indexOf('误')>=0?'wrong':'ok');
      s.textContent = t;
      lr.appendChild(s);
    });
    if (note) {
      var nb = document.createElement('span');
      nb.className = 'note-badge';
      nb.textContent = note;
      lr.appendChild(nb);
    }
    right.appendChild(lr);
  }

  // 卡片
  var wrap = document.createElement('div');
  wrap.className = 'tbl-wrap';
  wrap.id = 'tblWrap';

  var head = document.createElement('div');
  head.className = 'tbl-head';
  head.innerHTML = '<span class="tbl-head-title">对话内容</span><span class="tbl-head-meta">' + turns.length + ' 轮 &nbsp;·&nbsp; 末轮蓝色 &nbsp;·&nbsp; 点击行可黄色标注</span>';
  wrap.appendChild(head);

  var MAX = 8;
  var showTurns, foldedCount = 0;
  if (turns.length > MAX) {
    foldedCount = turns.length - 6;
    showTurns = turns.slice(0, 3).concat([null]).concat(turns.slice(-3));
  } else {
    showTurns = turns.slice();
  }

  var tbl = document.createElement('table');
  var thead = document.createElement('thead');
  thead.innerHTML = '<tr><th>#</th><th>Prompt（用户输入）</th><th>Answer（AI 回复）</th></tr>';
  tbl.appendChild(thead);

  var tbody = document.createElement('tbody');

  for (var j = 0; j < showTurns.length; j++) {
    var t = showTurns[j];
    if (t === null) {
      var fr = document.createElement('tr');
      fr.className = 'fold-row';
      fr.innerHTML = '<td colspan="3">— 省略中间 ' + foldedCount + ' 轮 —</td>';
      tbody.appendChild(fr);
      continue;
    }
    var realIdx = (turns.length <= MAX || j < 3) ? j : (turns.length - (showTurns.length - 1 - j));
    var isLast = (j === showTurns.length - 1);
    var tr = document.createElement('tr');
    if (isLast) tr.className = 'last-row';

    // 点击切换黄色高亮
    (function(row) {
      row.addEventListener('click', function() {
        if (row.classList.contains('fold-row')) return;
        row.classList.toggle('hl-row');
      });
    })(tr);

    var tdNum = document.createElement('td');
    tdNum.textContent = realIdx + 1;

    var tdP = document.createElement('td');
    var pt = t.prompt || '';
    tdP.textContent = pt.length > 400 ? pt.slice(0, 400) + '…' : (pt || '—');

    var tdA = document.createElement('td');
    var at = t.answer || '';
    tdA.textContent = at.length > 400 ? at.slice(0, 400) + '…' : (at || '—');

    tr.appendChild(tdNum);
    tr.appendChild(tdP);
    tr.appendChild(tdA);
    tbody.appendChild(tr);
  }

  tbl.appendChild(tbody);
  wrap.appendChild(tbl);
  right.appendChild(wrap);

  // 按钮行
  var btnRow = document.createElement('div');
  btnRow.className = 'btn-row';

  var shotBtn = document.createElement('button');
  shotBtn.className = 'action-btn btn-shot';
  shotBtn.textContent = '📷 保存为图片';
  shotBtn.onclick = function() { doScreenshot(wrap, shotBtn); };

  var hint = document.createElement('span');
  hint.className = 'action-btn btn-hint';
  hint.textContent = '💡 点击表格行可手动黄色标注';

  btnRow.appendChild(shotBtn);
  btnRow.appendChild(hint);
  right.appendChild(btnRow);
}

function doScreenshot(el, btn) {
  btn.disabled = true;
  btn.textContent = '⏳ 生成中...';

  // 用 Canvas API 手动截图，不依赖外部库
  var rect = el.getBoundingClientRect();
  var scale = window.devicePixelRatio || 2;

  // 降级：直接用 dom-to-image 方式，或用原生 API
  // 这里用内联 SVG foreignObject 方案
  var w = el.offsetWidth;
  var h = el.offsetHeight;

  var xml = new XMLSerializer().serializeToString(el);
  // 转义特殊字符
  xml = xml.replace(/&nbsp;/g, '&#160;');

  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '">' +
    '<foreignObject width="100%" height="100%">' +
    '<div xmlns="http://www.w3.org/1999/xhtml">' + xml + '</div>' +
    '</foreignObject></svg>';

  var img = new Image();
  var url = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  img.onload = function() {
    var canvas = document.createElement('canvas');
    canvas.width = w * 2;
    canvas.height = h * 2;
    var ctx = canvas.getContext('2d');
    ctx.scale(2, 2);
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, w, h);
    ctx.drawImage(img, 0, 0, w, h);

    canvas.toBlob(function(blob) {
      if (navigator.clipboard && window.ClipboardItem) {
        navigator.clipboard.write([new ClipboardItem({'image/png': blob})])
          .then(function() { showDone(btn, '✅ 已复制到剪贴板'); })
          .catch(function() { downloadBlob(blob, btn); });
      } else {
        downloadBlob(blob, btn);
      }
    }, 'image/png');
  };
  img.onerror = function() {
    // SVG 方案失败，直接下载 HTML 截图替代
    btn.disabled = false;
    btn.textContent = '📷 保存为图片';
    alert('截图失败，请使用浏览器自带截图（Shift+Cmd+4）');
  };
  img.src = url;
}

function downloadBlob(blob, btn) {
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'dialog-' + Date.now() + '.png';
  a.click();
  URL.revokeObjectURL(url);
  showDone(btn, '✅ 已下载');
}

function showDone(btn, msg) {
  btn.textContent = msg;
  btn.classList.add('done');
  setTimeout(function() {
    btn.textContent = '📷 保存为图片';
    btn.classList.remove('done');
    btn.disabled = false;
  }, 2000);
}
</script>
</body>
</html>
